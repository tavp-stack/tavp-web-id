name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Validate composer.json
        run: composer validate --strict
      - name: Check PHP syntax
        run: find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \; | (! grep -v "No syntax errors")

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: phalcon
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      - name: Check assets exist
        run: |
          test -f public/assets/critical.css
          test -f public/assets/fonts.css
          test -f public/assets/app.css
          test -f public/js/prism-bundle.js
          test -f public/js/alpine.min.js
          echo "All assets present"
