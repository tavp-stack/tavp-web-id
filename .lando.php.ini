; Lando PHP configuration for TAVP Stack.
; This file is loaded by Lando via conf.php in .lando.yml.

; Load Phalcon extension (auto-detected from install location).
; If Phalcon is not installed, this line is ignored by PHP.
extension=phalcon.so

; Performance
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=128
opcache.max_accelerated_files=10000

; Upload limits
upload_max_filesize=64M
post_max_size=64M
memory_limit=256M
max_execution_time=30
